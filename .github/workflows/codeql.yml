name: CodeQL

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up the CodeQL analysis
        uses: github/codeql-action/init@v2
        with:
          languages: "javascript"

      - name: Run CodeQL analysis
        uses: github/codeql-action/analyze@v2
        with:
          category: "security"

